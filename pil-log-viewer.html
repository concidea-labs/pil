<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIL Viewer — concidea.labs</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #07090f;
  --bg1:    #0c1018;
  --bg2:    #111720;
  --border: #1c2535;
  --dim:    #2e3f58;
  --muted:  #4a6180;
  --mid:    #7a9cbd;
  --text:   #c8daf0;
  --bright: #eaf2ff;
  --blue:   #00c8ff;
  --green:  #30e08a;
  --red:    #ff5060;
  --purple: #c080f8;
  --mono:   'JetBrains Mono', monospace;
  --sans:   'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
}

/* HEADER */
header {
  border-bottom: 1px solid var(--border); background: var(--bg1);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.logo { font-family: var(--sans); font-size: 1rem; font-weight: 800; color: var(--bright); }
.logo span { color: var(--blue); }
.logo-sub { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
.header-right { display: flex; align-items: center; gap: 8px; }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg1); padding: 0 24px; }
.tab {
  font-family: var(--mono); font-size: 0.72rem; padding: 10px 16px; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
  user-select: none; display: flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--bright); border-bottom-color: var(--blue); }
.tab-count {
  font-size: 0.58rem; padding: 1px 5px; border-radius: 2px;
  background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
}
.tab.active .tab-count { background: rgba(0,200,255,.1); color: var(--blue); border-color: rgba(0,200,255,.3); }

/* TOOLBAR */
.toolbar {
  padding: 9px 24px; border-bottom: 1px solid rgba(255,255,255,.04);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: space-between;
}
.toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
input[type=text] {
  font-family: var(--mono); font-size: 0.72rem; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 3px; color: var(--text);
  padding: 4px 10px; outline: none; width: 150px; transition: border-color .15s;
}
input[type=text]:focus { border-color: var(--dim); }
.btn {
  font-family: var(--mono); font-size: 0.66rem; padding: 4px 11px; border-radius: 3px;
  cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--muted);
  transition: all .15s; white-space: nowrap;
}
.btn:hover { color: var(--text); border-color: var(--dim); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.active { color: var(--blue); border-color: rgba(0,200,255,.4); background: rgba(0,200,255,.07); }
.btn.action { color: var(--purple); border-color: rgba(192,128,248,.4); background: rgba(192,128,248,.07); }
.btn.dl     { color: var(--green);  border-color: rgba(48,224,138,.4);  background: rgba(48,224,138,.07); }
.view-toggle { display: flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
.view-toggle .btn { border: none; border-radius: 0; border-right: 1px solid var(--border); }
.view-toggle .btn:last-child { border-right: none; }

/* CHIPS */
.chips { display: flex; gap: 4px; flex-wrap: wrap; }
.chip {
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.07em;
  padding: 2px 7px; border-radius: 2px; cursor: pointer; border: 1px solid; background: transparent;
  transition: all .12s; font-family: var(--mono);
}

/* PASTE */
.paste-wrap { padding: 20px 24px; }
textarea {
  width: 100%; height: 130px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; color: var(--mid); font-family: var(--mono); font-size: 0.72rem;
  padding: 12px; outline: none; resize: vertical; line-height: 1.6;
}
textarea:focus { border-color: var(--dim); }

/* CONTENT */
.content { padding: 20px 24px; max-width: 980px; }
.day { margin-bottom: 26px; }
.day-header { display: flex; align-items: baseline; gap: 12px; padding-bottom: 7px; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
.day-date { font-size: 0.88rem; font-weight: 700; color: var(--bright); }
.day-meta  { font-size: 0.61rem; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }
.section-label {
  font-size: 0.67rem; color: rgba(96,165,250,.8); background: rgba(96,165,250,.06);
  border: 1px solid rgba(96,165,250,.2); border-radius: 3px; padding: 1px 7px;
  margin-bottom: 5px; display: inline-block;
}
.entry {
  display: grid; gap: 8px; align-items: baseline;
  padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.03);
  animation: fi .2s ease both;
}
.entry.flat    { grid-template-columns: 78px auto 1fr; }
.entry.sect    { grid-template-columns: 90px 1fr; }
.entry.bug     { grid-template-columns: 78px auto 1fr; }
.entry-desc { font-size: 0.77rem; color: var(--mid); line-height: 1.5; }
.bug-parts { display: flex; flex-direction: column; gap: 2px; }
.bug-s { font-size: .77rem; color: var(--mid); }
.bug-c { font-size: .7rem; color: var(--muted); }
.bug-c::before { content: '↳ cause: '; color: var(--dim); }
.bug-f { font-size: .7rem; color: var(--muted); }
.bug-f::before { content: '↳ fix: '; color: var(--dim); }
@keyframes fi { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
.badge {
  font-size: 0.59rem; letter-spacing: .07em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px; border: 1px solid; white-space: nowrap; text-align: center;
}
.comp {
  font-size: 0.73rem; white-space: nowrap; padding: 1px 6px;
  border-radius: 2px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03);
}

/* HUMAN VIEW */
.human { line-height: 1.85; }
.human h2 { font-family: var(--sans); font-size: .9rem; font-weight: 700; color: var(--bright); border-bottom: 1px solid var(--border); padding-bottom: 7px; margin: 0 0 14px; }
.human h3 { font-size: .61rem; font-weight: 500; color: var(--dim); text-transform: uppercase; letter-spacing: .12em; margin: 18px 0 7px; }
.human .bul { display: flex; gap: 10px; margin-bottom: 6px; }
.human .bul-dot { color: var(--dim); flex-shrink: 0; }
.human .bul-text { font-size: .83rem; color: var(--mid); font-style: italic; line-height: 1.75; }
.human p { font-size: .83rem; color: var(--muted); font-style: italic; margin: 0 0 12px; line-height: 1.75; }

.empty { padding: 48px 0; color: var(--dim); font-size: .79rem; text-align: center; }
.blink { animation: blink 1.1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
footer { padding: 18px 24px; font-size: .61rem; color: var(--dim); border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--blue); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">P<span>IL</span> Viewer</div>
    <div class="logo-sub">changelog · bugfixlog · pilhum — concidea.labs</div>
  </div>
  <div class="header-right">
    <span id="apiBadge" class="chip" style="color:var(--muted);border-color:var(--border);cursor:default">api key: not set</span>
    <label class="btn" style="cursor:pointer">
      load .pil
      <input type="file" id="fileInput" multiple accept=".pil,.pilhum" style="display:none">
    </label>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tabCL" onclick="switchTab('cl')">changelog.pil <span class="tab-count" id="cntCL">0</span></div>
  <div class="tab"        id="tabBF" onclick="switchTab('bf')">bugfixlog.pil <span class="tab-count" id="cntBF">0</span></div>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="view-toggle">
      <button class="btn active" id="btnRaw"   onclick="setView('raw')">raw .pil</button>
      <button class="btn"        id="btnHuman" onclick="setView('human')">.pilhum</button>
    </div>
    <input type="text" id="filterInput" placeholder="filter…" oninput="applyFilter()">
    <div class="chips" id="chips"></div>
    <button class="btn" id="btnClear" style="display:none" onclick="clearFilter()">✕</button>
  </div>
  <div class="toolbar-right">
    <button class="btn dl"     id="btnDL"  style="display:none" onclick="dlPilhum()">↓ .pilhum</button>
    <button class="btn action" id="btnGen" onclick="generate()">✦ generate .pilhum</button>
  </div>
</div>

<div id="pasteWrap" class="paste-wrap">
  <textarea id="pasteInput" placeholder="Paste changelog.pil or bugfixlog.pil content here — or drag a file anywhere on the page…" oninput="onPaste()"></textarea>
</div>

<div class="content" id="content"></div>

<footer>
  <span>PIL · <a href="https://github.com/concidea-labs/pil" target="_blank">concidea-labs/pil</a> · <a href="mailto:labs@concidea.de">labs@concidea.de</a></span>
  <span id="stats"></span>
</footer>

<script>
// ── TYPE COLORS ──────────────────────────────────────────────────────────────
const TC = {
  // standard PIL
  added:'#4ade80', created:'#60a5fa', changed:'#facc15', fixed:'#f97316',
  removed:'#f87171', refactor:'#c084fc', docs:'#94a3b8',
  // extended
  fix:'#f97316', bugfix:'#f97316', feature:'#4ade80', migration:'#60a5fa',
  frontend:'#818cf8', endpoints:'#2dd4bf', data_repair:'#fbbf24',
  affected:'#fbbf24', resolution:'#a78bfa', decided:'#e879f9',
  // bugfix protocol
  symptom:'#f87171', root_cause:'#fb923c', cascade:'#fbbf24',
  learned:'#a3e635', followup:'#94a3b8',
};
const SEVC = { critical:'#ff5060', high:'#f97316', medium:'#facc15', low:'#7a9cbd' };
const EXTC = { go:'#4ade80', rs:'#f97316', ts:'#60a5fa', tsx:'#60a5fa', pil:'#c084fc', sql:'#facc15', md:'#94a3b8' };
const SKIP = new Set(['backend.version','frontend.version','type']);

// ── STATE ────────────────────────────────────────────────────────────────────
const S = {
  tab:'cl', view:'raw',
  cl:{ raw:'', days:[], all:[] },
  bf:{ raw:'', days:[], all:[] },
  filter:'', activeType:null,
  human:{ cl:'', bf:'' },
  generating:false,
  apiKey: localStorage.getItem('pil_api_key')||'',
};

// ── PARSERS ──────────────────────────────────────────────────────────────────
// Format A (flat):    YYYY-MM-DD: component (type) — description
// Format B (section): ## YYYY-MM-DD: Section \n type: description

function isSectionFmt(text) { return /^##\s+\d{4}-\d{2}-\d{2}:/m.test(text); }

function parseAny(text, isBug) {
  return isSectionFmt(text) ? parseSection(text) : parseFlat(text, isBug);
}

function parseFlat(text, isBug) {
  const days = {}; let project = '';
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;
    const pm = line.match(/project:\s*(.+)/); if (pm) { project = pm[1].trim(); continue; }
    if (line.startsWith('#')) continue;
    if (isBug) {
      const m = line.match(/^(\d{4}-\d{2}-\d{2}):\s+(.+?)\s+\((\w+)\)\s+[—–-]+\s+(.+)$/);
      if (!m) continue;
      const [,date,component,severity,rest] = m;
      const p = rest.split(/\s*\|\s*/);
      if (!days[date]) days[date]=[];
      days[date].push({ kind:'bug', date, component, severity:severity.toLowerCase(), symptom:p[0]||rest, cause:p[1]||'', fix:p[2]||'' });
    } else {
      const m = line.match(/^(\d{4}-\d{2}-\d{2}):\s+(.+?)\s+\((\w+)\)\s+[—–-]+\s+(.+)$/);
      if (!m) continue;
      const [,date,component,type,desc] = m;
      if (!days[date]) days[date]=[];
      days[date].push({ kind:'flat', date, component, type:type.toLowerCase(), desc });
    }
  }
  return mk(days, project);
}

function parseSection(text) {
  const days = {}; let project='', curDate='', curSec='';
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;
    const pm = line.match(/project:\s*(.+)/); if (pm) { project=pm[1].trim(); continue; }
    const sm = line.match(/^##\s+(\d{4}-\d{2}-\d{2}):\s+(.+)$/);
    if (sm) { curDate=sm[1]; curSec=sm[2]; if (!days[curDate]) days[curDate]=[]; continue; }
    if (line.startsWith('##')) { curDate=''; curSec=''; continue; }
    if (line.startsWith('#')) continue;
    if (!curDate) continue;
    const kv = line.match(/^(\w+(?:\.\d+)?)\s*:\s+(.+)$/);
    if (!kv) continue;
    const [,key,desc] = kv;
    const type = key.replace(/\.\d+$/,'');
    if (SKIP.has(key)||SKIP.has(type)) continue;
    days[curDate].push({ kind:'sect', date:curDate, section:curSec, type:type.startsWith('phase')?'feature':type, desc });
  }
  return mk(days, project);
}

function mk(days, project) {
  const sorted = Object.entries(days).sort(([a],[b])=>b.localeCompare(a));
  return { project, days:sorted, all:sorted.flatMap(([,e])=>e) };
}

// ── FILE TYPE DETECTION ──────────────────────────────────────────────────────
// This viewer is for changelog.pil and bugfixlog.pil only.
// General PIL files (CLAUDE.pil, pil-context.pil, etc.) are not supported.

function detectFileType(text, filename) {
  const name = (filename||'').toLowerCase();
  // Explicit filename match
  if (/bug/i.test(name))       return 'bf';
  if (/changelog/i.test(name)) return 'cl';
  // Content heuristic: has dated entries?
  const hasDatedEntries = /^\d{4}-\d{2}-\d{2}:/m.test(text);
  const hasDatedSections = /^##\s+\d{4}-\d{2}-\d{2}:/m.test(text);
  if (!hasDatedEntries && !hasDatedSections) return null; // not a log file
  // Bugfix heuristic: contains severity keywords or pipe-separated fields
  if (/\((critical|high|medium|low)\)/i.test(text)) return 'bf';
  if (/symptom|root_cause|cascade/i.test(text))     return 'bf';
  return 'cl'; // default to changelog
}

function showFileError(filename) {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div style="padding:40px 0;max-width:520px">
      <div style="font-size:.72rem;color:var(--red);border:1px solid rgba(255,80,96,.3);background:rgba(255,80,96,.06);border-radius:4px;padding:14px 16px;margin-bottom:16px">
        <div style="font-weight:700;margin-bottom:6px">Not a log file: ${esc(filename)}</div>
        <div style="color:var(--muted);line-height:1.7">
          This viewer is for <span style="color:var(--blue)">changelog.pil</span> and
          <span style="color:var(--blue)">bugfixlog.pil</span> only.<br>
          General PIL files (CLAUDE.pil, pil-context.pil, …) are not supported here.
        </div>
      </div>
      <div style="font-size:.7rem;color:var(--dim);line-height:1.9">
        Expected format:<br>
        <span style="color:var(--mid)">changelog: </span><span style="color:var(--text)">YYYY-MM-DD: component (type) — description</span><br>
        <span style="color:var(--mid)">bugfixlog: </span><span style="color:var(--text)">YYYY-MM-DD: component (severity) — symptom | cause | fix</span><br><br>
        See <span style="color:var(--blue)">examples/</span> in the repo for sample files.
      </div>
    </div>`;
  document.getElementById('pasteWrap').style.display = 'none';
}

// ── LOAD ─────────────────────────────────────────────────────────────────────
function loadText(text, filename) {
  const key = detectFileType(text, filename);
  if (!key) { showFileError(filename); return; }
  const isBug = key === 'bf';
  S[key] = { raw:text, ...parseAny(text, isBug) };
  S.human[key]=''; S.tab=key;
  updateTabs(); updateCounts(); render();
  document.getElementById('pasteWrap').style.display='none';
}

document.getElementById('fileInput').addEventListener('change', e => {
  [...e.target.files].forEach(f=>{ const r=new FileReader(); r.onload=ev=>loadText(ev.target.result,f.name); r.readAsText(f); });
});

function onPaste() {
  const text = document.getElementById('pasteInput').value.trim();
  if (!text) return;
  const key = detectFileType(text, '') || S.tab;
  const isBug = key === 'bf';
  S[key] = { raw:text, ...parseAny(text, isBug) };
  S.human[key]=''; S.tab=key;
  updateTabs(); updateCounts(); render();
}

document.body.addEventListener('dragover', e=>e.preventDefault());
document.body.addEventListener('drop', e=>{ e.preventDefault(); [...e.dataTransfer.files].forEach(f=>{ const r=new FileReader(); r.onload=ev=>loadText(ev.target.result,f.name); r.readAsText(f); }); });

// ── NAV ──────────────────────────────────────────────────────────────────────
function switchTab(tab) { S.tab=tab; S.filter=''; S.activeType=null; document.getElementById('filterInput').value=''; updateTabs(); render(); }
function updateTabs() {
  document.getElementById('tabCL').className='tab'+(S.tab==='cl'?' active':'');
  document.getElementById('tabBF').className='tab'+(S.tab==='bf'?' active':'');
}
function setView(v) {
  S.view=v;
  document.getElementById('btnRaw').className  ='btn'+(v==='raw'  ?' active':'');
  document.getElementById('btnHuman').className='btn'+(v==='human'?' active':'');
  render();
}
function applyFilter()  { S.filter=document.getElementById('filterInput').value.toLowerCase(); S.activeType=null; updateChips(); render(); }
function setTypeFilter(t) { S.activeType=S.activeType===t?null:t; S.filter=''; document.getElementById('filterInput').value=''; updateChips(); render(); }
function clearFilter()  { S.filter=''; S.activeType=null; document.getElementById('filterInput').value=''; updateChips(); render(); }

function updateChips() {
  const data=S[S.tab]; if (!data.all) return;
  const isBug=S.tab==='bf';
  const types=[...new Set(data.all.map(e=>isBug&&e.severity?e.severity:e.type))].filter(Boolean).sort();
  document.getElementById('chips').innerHTML=types.map(t=>{
    const c=TC[t]||SEVC[t]||'#7a9cbd'; const on=S.activeType===t;
    return `<span class="chip" onclick="setTypeFilter('${t}')" style="color:${on?c:c+'88'};border-color:${on?c+'80':c+'40'};background:${on?c+'12':'transparent'}">${t}</span>`;
  }).join('');
  document.getElementById('btnClear').style.display=(S.filter||S.activeType)?'':'none';
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const data=S[S.tab]; const el=document.getElementById('content'); const isBug=S.tab==='bf';
  updateChips();
  document.getElementById('btnDL').style.display=(S.view==='human'&&S.human[S.tab])?'':'none';
  if (S.view==='human') { renderHuman(el); return; }
  if (!data.days||!data.days.length) { el.innerHTML='<div class="empty">No entries yet — paste content above or drag a .pil file.</div>'; updateStats(0,0); return; }
  let html='', shown=0;
  for (const [date,entries] of data.days) {
    const filtered=filterEntries(entries,isBug); if (!filtered.length) continue;
    shown+=filtered.length;
    const d=new Date(date+'T00:00:00');
    html+=`<div class="day"><div class="day-header"><span class="day-date">${d.toLocaleDateString('en',{year:'numeric',month:'long',day:'numeric'})}</span><span class="day-meta">${d.toLocaleDateString('en',{weekday:'long'})} · ${filtered.length} entr${filtered.length!==1?'ies':'y'}</span></div>${renderEntries(filtered,isBug)}</div>`;
  }
  el.innerHTML=html||'<div class="empty">No entries match the current filter.</div>';
  updateStats(data.all?.length||0,shown);
}

function filterEntries(entries,isBug) {
  return entries.filter(e=>{
    if (S.activeType) return (isBug?e.severity:e.type)===S.activeType;
    if (S.filter) return [e.component||'',e.section||'',e.type||'',e.severity||'',e.desc||'',e.symptom||'',e.cause||'',e.fix||''].join(' ').toLowerCase().includes(S.filter);
    return true;
  });
}

function renderEntries(entries, isBug) {
  if (entries.some(e=>e.kind==='sect')) {
    const secs={};
    entries.forEach(e=>{ const s=e.section||''; if (!secs[s]) secs[s]=[]; secs[s].push(e); });
    return Object.entries(secs).map(([sec,items])=>
      `<div style="margin-bottom:12px">${sec?`<div class="section-label">${esc(sec)}</div>`:''}`+
      items.map((e,i)=>entryRow(e,i,false)).join('')+'</div>'
    ).join('');
  }
  return entries.map((e,i)=>entryRow(e,i,isBug)).join('');
}

function entryRow(e,i,isBug) {
  const d=`animation-delay:${i*.03}s`;
  if (isBug||e.kind==='bug') {
    const c=SEVC[e.severity]||'#7a9cbd';
    return `<div class="entry bug" style="${d}">${bdg(e.severity||'?',c)}<span class="comp" style="${cs(e.component)}">${esc(e.component||'')}</span><div class="bug-parts"><div class="bug-s">${esc(e.symptom||e.desc||'')}</div>${e.cause?`<div class="bug-c">${esc(e.cause)}</div>`:''}${e.fix?`<div class="bug-f">${esc(e.fix)}</div>`:''}</div></div>`;
  }
  if (e.kind==='sect') {
    const c=TC[e.type]||'#7a9cbd';
    return `<div class="entry sect" style="${d}">${bdg(e.type||'?',c)}<span class="entry-desc">${esc(e.desc||'')}</span></div>`;
  }
  const c=TC[e.type]||'#7a9cbd';
  return `<div class="entry flat" style="${d}">${bdg(e.type||'?',c)}<span class="comp" style="${cs(e.component)}">${esc(e.component||'')}</span><span class="entry-desc">${esc(e.desc||'')}</span></div>`;
}

function bdg(label,color) { return `<span class="badge" style="color:${color};border-color:${color}50;background:${color}12">${esc(label)}</span>`; }
function cs(name) { const ext=(name||'').match(/\.(\w+)$/)?.[1]; const c=EXTC[ext]||'#7a9cbd'; return `color:${c};background:${c}08;border-color:${c}30`; }

// ── HUMAN VIEW ───────────────────────────────────────────────────────────────
function renderHuman(el) {
  const text=S.human[S.tab];
  if (S.generating) { el.innerHTML=`<div class="empty"><span style="color:var(--purple)" class="blink">✦</span> &nbsp;generating .pilhum…</div>`; return; }
  if (!text) { el.innerHTML=`<div class="empty">Click "✦ generate .pilhum" to transform the log.</div>`; return; }
  let html='<div class="human">';
  for (const line of text.split('\n')) {
    if      (line.startsWith('## '))  html+=`<h2>${esc(line.slice(3))}</h2>`;
    else if (line.startsWith('### ')) html+=`<h3>${esc(line.slice(4))}</h3>`;
    else if (line.startsWith('- '))   html+=`<div class="bul"><span class="bul-dot">·</span><span class="bul-text">${esc(line.slice(2))}</span></div>`;
    else if (line.trim())             html+=`<p>${esc(line)}</p>`;
  }
  el.innerHTML=html+'</div>';
}

// ── GENERATE ─────────────────────────────────────────────────────────────────
const PROMPTS = {
  cl:`You receive a PIL changelog. Transform into a human-readable release summary:

## {date range} — {project name}

{1-2 sentence narrative}

### What's new
- {grouped readable bullets}

### Technical notes
- {only genuinely interesting technical details}

Rules: developer audience, concise, group related changes, skip trivial entries. Output ONLY formatted text.`,

  bf:`You receive a PIL bugfixlog. Transform into a human-readable bug report summary:

## {date range} — {project name} Bug Report

{1-2 sentence stability overview}

### Fixed Issues
- {grouped by severity, symptom and fix in plain language}

### Root Causes
- {patterns — valuable for future prevention}

Rules: developer audience, concise, focus on patterns. Output ONLY formatted text.`
};

async function generate() {
  if (!S.apiKey) {
    S.apiKey=prompt('Anthropic API key (stored locally):')||'';
    if (!S.apiKey) return;
    localStorage.setItem('pil_api_key',S.apiKey);
    updateApiBadge();
  }
  const key=S.tab; const data=S[key]; if (!data.raw) return;
  S.generating=true; S.view='human'; setView('human'); render();
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:PROMPTS[key],messages:[{role:'user',content:data.raw}]}),
    });
    const json=await res.json();
    if (json.error) throw new Error(json.error.message);
    S.human[key]=json.content?.map(b=>b.text||'').join('')||'';
    updateApiBadge(true);
  } catch(e) { S.human[key]=`Error: ${e.message}`; updateApiBadge(false); }
  S.generating=false; render();
  document.getElementById('btnDL').style.display=S.human[key]?'':'none';
}

function dlPilhum() {
  const key=S.tab; const text=S.human[key]; if (!text) return;
  const name=key==='bf'?'bugfixlog':'changelog';
  const out=`# .pilhum — AI-generated human summary\n# source: ${name}.pil\n# generated: ${new Date().toISOString().slice(0,10)}\n\n${text}`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([out],{type:'text/plain'}));
  a.download=`${name}.pilhum`; a.click();
}

function updateApiBadge(ok) {
  const b=document.getElementById('apiBadge');
  if (ok===undefined) { b.textContent=S.apiKey?'api key: set':'api key: not set'; b.style.color=S.apiKey?'var(--green)':'var(--muted)'; b.style.borderColor=S.apiKey?'rgba(48,224,138,.4)':'var(--border)'; }
  else if (ok) { b.textContent='api: ok'; b.style.color='var(--green)'; b.style.borderColor='rgba(48,224,138,.4)'; }
  else { b.textContent='api: error'; b.style.color='var(--red)'; b.style.borderColor='rgba(255,80,96,.4)'; }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function updateCounts() { document.getElementById('cntCL').textContent=S.cl.all?.length||0; document.getElementById('cntBF').textContent=S.bf.all?.length||0; }
function updateStats(total,shown) { document.getElementById('stats').textContent=total?(shown===total?`${total} entries`:`${shown} / ${total} entries`):''; }

updateApiBadge(); updateCounts(); render();
</script>
</body>
</html>
